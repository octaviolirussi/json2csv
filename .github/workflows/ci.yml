# ---------------------------------------------------------------------------
# json2csv – CI/CD workflow
#
# Triggers:
#   • Every push to any branch
#   • Every pull-request targeting main
#
# Jobs:
#   quality  – ruff, black, mypy, pyright, bandit
#   test     – pytest (≥85 % coverage)
#   docs     – pdoc (runs only on successful PR merge to main)
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:

  # -------------------------------------------------------------------------
  # quality: static analysis & security
  # -------------------------------------------------------------------------
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: ruff – lint
        run: ruff check src tests

      - name: ruff – format check
        run: ruff format --check src tests

      - name: black – format check
        run: black --check src tests

      - name: mypy – type check
        run: mypy src tests

      - name: pyright – type check
        run: pyright src tests

      - name: bandit – security scan
        run: bandit -r src -c pyproject.toml

  # -------------------------------------------------------------------------
  # test: unit tests + coverage
  # -------------------------------------------------------------------------
  test:
    name: Tests (pytest ≥85 % coverage)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: pytest + coverage
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # -------------------------------------------------------------------------
  # docs: generate & publish pdoc documentation
  # Runs only when a PR is merged into main (push event on main)
  # -------------------------------------------------------------------------
  docs:
    name: Generate & Publish Documentation
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write   # needed to push to gh-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Generate pdoc documentation
        run: |
          pdoc --output-directory docs/site src/json2csv

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/site
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: auto-update from ${{ github.sha }}"
